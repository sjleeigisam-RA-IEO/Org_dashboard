<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IGIS RA Insight Portal</title>
    <link rel="stylesheet" href="./org_dashboard/admin.css"> <!-- Reusing admin styles for consistent dark theme -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./CRM_base/portfolio-analysis/config.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1c1c1e, #141415);
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-logo { font-size: 56px; margin-bottom: 24px; }
        h1 { margin: 0 0 8px; font-size: 32px; font-weight: 800; }
        p.subtitle { color: #8e8e93; margin-bottom: 40px; font-size: 15px; }
        
        .input-group { text-align: left; margin-bottom: 24px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #8e8e93; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(251, 241, 103, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251, 241, 103, 0.2); }
        .message { margin-top: 24px; font-size: 14px; min-height: 20px; font-weight: 500; }
        .error { color: #ff453a; }
        .success { color: #32d74b; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">🛰️</div>
        <h1>IGIS RA Portal</h1>
        <p class="subtitle">부문 통합 데이터 대시보드</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>이메일 주소</label>
                <input type="email" id="emailInput" placeholder="example@igisam.com" required>
            </div>
            <div class="input-group">
                <label>배포 코드 (Passcode)</label>
                <input type="password" id="codeInput" placeholder="코드를 입력하세요" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">로그인 시스템 접속</button>
        </form>
        
        <div id="messageArea" class="message"></div>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Session Logic
        const checkSession = () => {
            const raUser = JSON.parse(sessionStorage.getItem('ra_user'));
            const lastActive = parseInt(sessionStorage.getItem('last_active'));
            const TIMEOUT_LIMIT = 30 * 60 * 1000;

            if (raUser && lastActive && (Date.now() - lastActive < TIMEOUT_LIMIT)) {
                location.href = './portal.html';
            }
        };
        checkSession();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageArea = document.getElementById('messageArea');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();

            loginBtn.disabled = true;
            loginBtn.innerText = '인증 확인 중...';
            messageArea.innerText = '';

            try {
                // 1. Passcode Check (Local Hardcoded for speed as requested before: RA2026)
                if (code !== 'RA2026') {
                    throw new Error('배포 코드가 일치하지 않습니다.');
                }

                // 2. Supabase User Check
                const { data, error } = await _supabase
                    .from('staff')
                    .select('staff_id, name, email')
                    .eq('email', email)
                    .single();

                if (error || !data) {
                    throw new Error('등록되지 않은 이메일이거나 접근 권한이 없습니다.');
                }

                // 3. Success
                messageArea.innerHTML = `<span class="success">${data.name}님 환영합니다! 잠시 후 이동합니다...</span>`;
                sessionStorage.setItem('ra_user', JSON.stringify(data));
                sessionStorage.setItem('last_active', Date.now());
                localStorage.setItem('ra_user', JSON.stringify(data));
                localStorage.setItem('last_active', Date.now().toString());
                
                // URL 쿼리 파라미터에서 redirect 대상 추출
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTarget = urlParams.get('redirect');
                
                setTimeout(() => {
                    if (redirectTarget) {
                        location.href = redirectTarget;
                    } else {
                        location.href = './portal.html';
                    }
                }, 1000);

            } catch (err) {
                messageArea.innerHTML = `<span class="error">${err.message}</span>`;
                loginBtn.disabled = false;
                loginBtn.innerText = '로그인 시스템 접속';
            }
        };
    </script>
</body>
</html>
