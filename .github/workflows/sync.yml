name: Sync T5T Notion to Supabase

on:
  schedule:
    # Friday midnight checkpoint: Saturday 00:00 KST (Friday 15:00 UTC)
    - cron: '0 15 * * 5'
    # Monday first completion: Monday 08:00 KST (Sunday 23:00 UTC)
    - cron: '0 23 * * 0'
    # Tuesday final completion: Tuesday 09:00 KST (Tuesday 00:00 UTC)
    - cron: '0 0 * * 2'
  workflow_dispatch:
  repository_dispatch:
    types: [sync_notion_data]

concurrency:
  group: t5t-sync-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync_notion_to_supabase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r CRM_base/requirements.txt
          
      - name: Create Notion config from secrets
        run: |
          cat << EOF > notion_config.json
          {
            "NOTION_API_KEY": "${{ secrets.NOTION_API_KEY }}",
            "RAW_T5T_DB_ID": "${{ secrets.RAW_T5T_DB_ID }}",
            "NEW_PROJECT_DB_ID": "${{ secrets.NEW_PROJECT_DB_ID }}"
          }
          EOF
          
      - name: Run T5T Notion-to-dashboard pipeline
        timeout-minutes: 20
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_KEY }}
        run: |
          DATE_FROM=$(TZ=Asia/Seoul date -d '21 days ago' +%F)
          DATE_TO=$(TZ=Asia/Seoul date +%F)
          echo "Running T5T pipeline for ${DATE_FROM}..${DATE_TO}"
          python CRM_base/run_t5t_pipeline.py --date-from "$DATE_FROM" --date-to "$DATE_TO"

      - name: Generate weekly T5T summary
        if: github.event.schedule == '0 23 * * 0'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_KEY }}
        run: |
          python CRM_base/generate_t5t_weekly_summary.py --out t5t-dashboard/data/weekly_summary.json

      - name: Commit weekly T5T summary
        if: github.event.schedule == '0 23 * * 0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add t5t-dashboard/data/weekly_summary.json
          if git diff --cached --quiet; then
            echo "No weekly summary changes to commit."
          else
            git commit -m "Update T5T weekly summary"
            git push
          fi
