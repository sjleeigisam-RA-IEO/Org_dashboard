<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://script.googleusercontent.com; font-src 'self' data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content" />
    <title>자리배치 조직 레이어 테스트</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">자리배치 테스트</p>
          <h1>자리배치 조직 레이어 테스트</h1>
          <p class="hero-copy">운영 페이지와 분리된 로컬 테스트 화면입니다. 자리배치 위에 조직 레이어를 얹는 실험 버전입니다.</p>
        </div>
        <div class="hero-meta" id="heroMeta"></div>
      </header>

      <section class="view-switch" id="viewSwitch">
        <button class="view-tab active" type="button" data-view="org">조직구성</button>
        <button class="view-tab" type="button" data-view="seat">자리배치</button>
      </section>

      <div id="orgDashboardView">
        <section class="controls">
          <div class="search-box">
            <label for="searchInput">검색</label>
            <input id="searchInput" type="search" placeholder="이름, 조직, 파트, 센터명으로 검색" />
          </div>
          <div class="filter-box">
            <label for="roleFilter">직책 필터</label>
            <select id="roleFilter">
              <option value="all">전체 직책</option>
              <option value="그룹장">그룹장</option>
              <option value="파트장/센터장">파트장/센터장</option>
              <option value="담당디렉터">담당디렉터</option>
              <option value="시니어매니저">시니어매니저</option>
              <option value="매니저">매니저</option>
            </select>
          </div>
        </section>

        <section class="section-tabs" id="sectionTabs"></section>
        <section class="kpi-grid" id="kpiGrid"></section>
        <section class="analytics">
          <article class="panel">
            <div class="panel-head">
              <h2>섹션별 배치 현황</h2>
              <p>중복 제거한 고유 인원 기준</p>
            </div>
            <div id="sectionChart" class="bar-list"></div>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h2>직책별 분포</h2>
              <p>조직 좌석 기준으로 집계한 분포</p>
            </div>
            <div id="roleChart" class="bar-list"></div>
          </article>
        </section>
        <section class="org-board" id="orgBoard"></section>
      </div>

      <section class="seat-layout-view" id="seatLayoutView" hidden></section>
    </div>

    <div class="modal-backdrop" id="roleModal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="roleModalTitle">
        <div class="modal-head">
          <div>
            <p class="modal-eyebrow">직책 명단</p>
            <h2 id="roleModalTitle">직책 명단</h2>
          </div>
          <button class="modal-close" id="roleModalClose" type="button" aria-label="닫기">×</button>
        </div>
        <p class="modal-copy" id="roleModalSummary"></p>
        <div class="modal-list" id="roleModalList"></div>
      </div>
    </div>

    <script src="./seat-layout-org-overlay-test-flag.js"></script>
    <script src="./sheet-linked.config.js"></script>
    <script src="./org-data.js"></script>
    <script src="./seat-layout-data.js"></script>
    <script src="./sheet-loader.js"></script>
  </body>
</html>
